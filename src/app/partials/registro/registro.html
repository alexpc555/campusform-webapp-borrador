<div class="register-root">
  <div class="register-container">

    <!-- Logo -->
    <a class="brand fade-in-up" routerLink="/">
      <div class="brand-logo-wrapper">
        <img class="brand-logo" src="assets/images/logo_buap.png" alt="BUAP Logo" />
      </div>
      <span class="brand-name">CampusForum</span>
    </a>

    <!-- Card -->
    <div class="register-card fade-in-up delay-1">
      <div class="card-header">
        <div class="header-icon">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <h1 class="card-title">Crear Cuenta</h1>
        <p class="card-subtitle">Únete a la comunidad académica</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="register-form">

        <!-- Nombre -->
        <div class="form-group" [class.has-error]="name?.touched && name?.invalid">
          <label class="form-label">
            <i class="bi bi-person-fill"></i>
            Nombre Completo
          </label>
          <div class="input-wrapper">
            <i class="bi bi-person-badge input-icon"></i>
            <input
              type="text"
              class="form-input"
              placeholder="Juan Hernández Pérez"
              formControlName="name"
              [class.error]="name?.touched && name?.invalid"
            />
          </div>
          <div class="error-messages" *ngIf="name?.touched && name?.invalid">
            <div class="error-item" *ngIf="name?.hasError('required')">
              <i class="bi bi-info-circle-fill"></i>
              El nombre es requerido
            </div>
            <div class="error-item" *ngIf="name?.hasError('invalidName')">
              <i class="bi bi-info-circle-fill"></i>
              Solo se permiten letras y espacios
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group" [class.has-error]="email?.touched && email?.invalid">
          <label class="form-label">
            <i class="bi bi-envelope-fill"></i>
            Correo Electrónico
          </label>
          <div class="input-wrapper">
            <i class="bi bi-at input-icon"></i>
            <input
              type="email"
              class="form-input"
              [placeholder]="getEmailPlaceholder()"
              formControlName="email"
              [class.error]="email?.touched && email?.invalid"
            />
          </div>
          <div class="error-messages" *ngIf="email?.touched && email?.invalid">
            <div class="error-item">
              <i class="bi bi-info-circle-fill"></i>
              {{ getEmailErrorMessage() }}
            </div>
          </div>
        </div>

        <!-- Tipo de Usuario -->
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-people-fill"></i>
            Tipo de Usuario
          </label>
          <div class="role-selector">
            <label class="role-option" [class.active]="role?.value === 'student'">
              <input type="radio" formControlName="role" value="student" />
              <span class="role-content">
                <i class="bi bi-mortarboard-fill"></i>
                <span class="role-name">Estudiante</span>
                <span class="role-domain">@alumno.buap.mx</span>
              </span>
            </label>
            <label class="role-option" [class.active]="role?.value === 'teacher'">
              <input type="radio" formControlName="role" value="teacher" />
              <span class="role-content">
                <i class="bi bi-person-workspace"></i>
                <span class="role-name">Profesor</span>
                <span class="role-domain">@buap.mx</span>
              </span>
            </label>
            <label class="role-option" [class.active]="role?.value === 'admin'">
              <input type="radio" formControlName="role" value="admin" />
              <span class="role-content">
                <i class="bi bi-shield-shaded"></i>
                <span class="role-name">Administrador</span>
                <span class="role-domain">@admin.buap.mx</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group" [class.has-error]="password?.touched && password?.invalid">
          <label class="form-label">
            <i class="bi bi-key-fill"></i>
            Contraseña
          </label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              type="password"
              class="form-input"
              placeholder="••••••••"
              formControlName="password"
              [class.error]="password?.touched && password?.invalid"
            />
          </div>
          <div class="error-messages" *ngIf="password?.touched && password?.invalid">
            <div class="error-item" *ngFor="let error of getPasswordErrors()">
              <i class="bi bi-info-circle-fill"></i>
              {{ error }}
            </div>
          </div>
          <!-- Password strength indicator -->
          <div class="password-strength" *ngIf="password?.value">
            <div class="strength-bar">
              <div class="strength-fill" [style.width]="getPasswordStrength() + '%'"></div>
            </div>
            <span class="strength-text">{{ getPasswordStrengthText() }}</span>
          </div>
        </div>

        <!-- Confirmar Contraseña -->
        <div class="form-group" [class.has-error]="confirmPassword?.touched && confirmPassword?.invalid">
          <label class="form-label">
            <i class="bi bi-check-circle-fill"></i>
            Confirmar Contraseña
          </label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              type="password"
              class="form-input"
              placeholder="••••••••"
              formControlName="confirmPassword"
              [class.error]="confirmPassword?.touched && confirmPassword?.invalid"
            />
          </div>
          <div class="error-messages" *ngIf="confirmPassword?.touched && confirmPassword?.invalid">
            <div class="error-item" *ngIf="confirmPassword?.hasError('required')">
              <i class="bi bi-info-circle-fill"></i>
              Confirma tu contraseña
            </div>
            <div class="error-item" *ngIf="confirmPassword?.hasError('fieldsMismatch')">
              <i class="bi bi-info-circle-fill"></i>
              Las contraseñas no coinciden
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="submit-btn"
          [class.loading]="submitting"
          [disabled]="submitting || form.invalid"
        >
          <span *ngIf="!submitting" class="btn-content">
            <i class="bi bi-person-plus"></i>
            Crear Cuenta
          </span>
          <span *ngIf="submitting" class="btn-content">
            <span class="spinner"></span>
            Creando cuenta...
          </span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>¿Ya tienes una cuenta?</span>
      </div>

      <!-- Login link -->
      <button type="button" class="login-link" (click)="goLogin()">
        <i class="bi bi-box-arrow-in-right"></i>
        Iniciar Sesión
        <i class="bi bi-arrow-right"></i>
      </button>
    </div>

    <!-- Back to home -->
    <button type="button" class="back-link fade-in-up delay-2" (click)="goHome()">
      <i class="bi bi-arrow-left"></i>
      Volver al inicio
    </button>

  </div>
</div>
