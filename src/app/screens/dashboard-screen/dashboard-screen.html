<div class="dashboard-root landing-root">
  <!-- TOPBAR -->
  <mat-toolbar class="navbar-glass sticky-top border-bottom">
    <!-- Botón hamburguesa (solo móvil) -->
    <button mat-icon-button class="hide-desktop" (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="brand-icon">
      <mat-icon>school</mat-icon>
    </div>

    <span class="brand-name" style="margin-left: 10px;">CampusForum</span>

    <span style="flex: 1 1 auto;"></span>

    <!-- pill user -->
    <span class="pill badge-soft" style="display:inline-flex; align-items:center; gap:8px;">
      <mat-icon style="font-size:18px; width:18px; height:18px;">person</mat-icon>
      {{ userType }}
    </span>

    <!-- icons right (solo visual por ahora) -->
    <button mat-icon-button style="margin-left: 10px;">
      <mat-icon>settings</mat-icon>
    </button>

    <button mat-icon-button>
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>

  <!-- LAYOUT -->
  <mat-sidenav-container class="container">
    <!-- SIDEBAR -->
    <mat-sidenav
      #sidenav
      class="sidebar"
      [mode]="isMobile ? 'over' : 'side'"
      [opened]="!isMobile"
    >
      <button
        mat-button
        class="nav-btn"
        [class.active]="activeSection === 'Inicio'"
        (click)="setSection('Inicio')"
      >
        <mat-icon>home</mat-icon>
        Inicio
      </button>

      <button
        mat-button
        class="nav-btn"
        [class.active]="activeSection === 'Mis Posts'"
        (click)="setSection('Mis Posts')"
      >
        <mat-icon>chat</mat-icon>
        Mis Posts
      </button>

      <button
        mat-button
        class="nav-btn"
        [class.active]="activeSection === 'Populares'"
        (click)="setSection('Populares')"
      >
        <mat-icon>trending_up</mat-icon>
        Populares
      </button>

      <button
        mat-button
        class="nav-btn"
        [class.active]="activeSection === 'Guardados'"
        (click)="setSection('Guardados')"
      >
        <mat-icon>bookmark</mat-icon>
        Guardados
      </button>

      <!-- CATEGORÍAS -->
      <div class="sidebar-cats">
        <div class="sidebar-cats-title">CATEGORÍAS</div>

        <button
          mat-button
          class="nav-btn"
          [class.active]="activeCategory === 'Todas'"
          (click)="setCategory('Todas')"
        >
          Todas
        </button>

        <button
          mat-button
          class="nav-btn"
          [class.active]="activeCategory === 'Matemáticas'"
          (click)="setCategory('Matemáticas')"
        >
          Matemáticas
        </button>

        <button
          mat-button
          class="nav-btn"
          [class.active]="activeCategory === 'Programación'"
          (click)="setCategory('Programación')"
        >
          Programación
        </button>

        <button
          mat-button
          class="nav-btn"
          [class.active]="activeCategory === 'Física'"
          (click)="setCategory('Física')"
        >
          Física
        </button>

        <button
          mat-button
          class="nav-btn"
          [class.active]="activeCategory === 'Campus'"
          (click)="setCategory('Campus')"
        >
          historia
        </button>
      </div>
    </mat-sidenav>

    <!-- CONTENT -->
    <mat-sidenav-content class="content">
      <div class="page-wrap">
        <!-- BREADCRUMB -->
        <div class="breadcrumb">
          Inicio <span class="dot">›</span> Dashboard <span class="dot">›</span>
          {{ activeCategory || 'Todas' }}
        </div>

        <!-- HEADER -->
        <div class="content-header">
          <div class="content-title">
            <h1 class="section-title">Feed de Publicaciones</h1>
            <p class="section-subtitle">0 publicaciones encontradas</p>
          </div>

          <button mat-flat-button color="primary" class="new-post-btn" (click)="openNewPostModal()">
            Nueva publicación
          </button>
        </div>

        <!-- SEARCH + ORDER -->
        <div class="glass-card search-card">
          <div class="search-row">
            <mat-form-field appearance="outline" class="search-field">
              <mat-label>Buscar publicaciones...</mat-label>
              <mat-icon matPrefix>search</mat-icon>
              <input matInput [(ngModel)]="searchQuery" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="sort-field">
              <mat-label>Ordenar por</mat-label>
              <mat-select [(ngModel)]="sortBy">
                <mat-option value="recent">Más recientes</mat-option>
                <mat-option value="popular">Más populares</mat-option>
                <mat-option value="comments">Más comentados</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>

        <!-- POSTS (VACÍO POR AHORA) -->
        <div class="glass-card empty-state empty-card">
          <div class="empty-icon">🗂️</div>
          <h3 class="empty-title">Aún no hay publicaciones</h3>
          <p class="empty-text"></p>
        </div>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
