<div class="page-wrap">
  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    Inicio <span class="dot">›</span>

    <button mat-button class="breadcrumb-link" (click)="goBackDashboard()">
      Dashboard
    </button>

    <span class="dot">›</span>
    Populares
  </div>

  <!-- HEADER -->
  <div class="content-header">
    <div class="content-title">
      <h1 class="section-title">Publicaciones Populares</h1>
      <p class="section-subtitle">0 publicaciones encontradas</p>
    </div>
  </div>

  <!-- SEARCH + ORDER -->
  <div class="glass-card search-card">
    <div class="search-row">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar publicaciones...</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [(ngModel)]="searchQuery" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="sort-field">
        <mat-label>Ordenar por</mat-label>
        <mat-select [(ngModel)]="sortBy">
          <mat-option value="popular">Más populares</mat-option>
          <mat-option value="recent">Más recientes</mat-option>
          <mat-option value="comments">Más comentados</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div class="glass-card empty-state empty-card">
    <h3 class="empty-title">Aún no hay publicaciones populares</h3>
  </div>
</div>
