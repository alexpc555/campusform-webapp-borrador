<div class="login-root">
  <div class="login-container">

    <!-- Logo -->
    <a class="brand fade-in-up" routerLink="/">
      <div class="brand-logo-wrapper">
        <img class="brand-logo" src="assets/images/logo_buap.png" alt="BUAP Logo" />
      </div>
      <span class="brand-name">CampusForum</span>
    </a>

    <!-- Card -->
    <div class="login-card fade-in-up delay-1">
      <div class="card-header">
        <div class="header-icon">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1 class="card-title">Bienvenido de vuelta</h1>
        <p class="card-subtitle">Accede con tu correo institucional</p>
      </div>

      <!-- Mensaje de error general -->
      <div class="alert-error" *ngIf="errorMessage">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">

        <!-- Email -->
        <div class="form-group" [class.has-error]="email?.touched && email?.invalid">
          <label class="form-label">
            <i class="bi bi-envelope-fill"></i>
            Correo Institucional
          </label>
          <div class="input-wrapper">
            <i class="bi bi-at input-icon"></i>
            <input
              type="email"
              class="form-input"
              placeholder="ejemplo@alumno.buap.mx"
              formControlName="email"
              [class.error]="email?.touched && email?.invalid"
            />
          </div>
          <div class="error-message" *ngIf="email?.touched && email?.hasError('required')">
            <i class="bi bi-info-circle-fill"></i>
            El correo es requerido
          </div>
          <div class="error-message" *ngIf="email?.touched && email?.hasError('institutionalEmail')">
            <i class="bi bi-info-circle-fill"></i>
            Debe usar un correo institucional (&#64;alumno.buap.mx)
          </div>
        </div>

        <!-- Password -->
        <div class="form-group" [class.has-error]="password?.touched && password?.invalid">
          <label class="form-label">
            <i class="bi bi-key-fill"></i>
            Contraseña
          </label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              [type]="hidePassword ? 'password' : 'text'"
              class="form-input"
              placeholder="••••••••"
              formControlName="password"
              [class.error]="password?.touched && password?.invalid"
            />
            <button type="button" class="password-toggle" (click)="hidePassword = !hidePassword">
              <i [class]="hidePassword ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill'"></i>
            </button>
          </div>
          <div class="error-message" *ngIf="password?.touched && password?.hasError('required')">
            <i class="bi bi-info-circle-fill"></i>
            La contraseña es requerida
          </div>
          <div class="error-message" *ngIf="password?.touched && password?.hasError('minLengthTrim')">
            <i class="bi bi-info-circle-fill"></i>
            La contraseña debe tener al menos 6 caracteres
          </div>
        </div>



        <!-- Submit Button -->
        <button
          type="submit"
          class="submit-btn"
          [class.loading]="submitting"
          [disabled]="submitting"
        >
          <span *ngIf="!submitting" class="btn-content">
            <i class="bi bi-box-arrow-in-right"></i>
            Iniciar Sesión
          </span>
          <span *ngIf="submitting" class="btn-content">
            <span class="spinner"></span>
            Ingresando...
          </span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>¿Nuevo en CampusForum?</span>
      </div>

      <!-- Register link -->
      <a routerLink="/register" class="register-link">
        <i class="bi bi-person-plus-fill"></i>
        Crear una cuenta
        <i class="bi bi-arrow-right"></i>
      </a>
    </div>

    <!-- Back to home -->
    <a routerLink="/" class="back-link fade-in-up delay-2">
      <i class="bi bi-arrow-left"></i>
      Volver al inicio
    </a>

  </div>
</div>
