<div class="landing-root">
  <!-- Navbar (mismo estilo landing) -->
  <nav class="navbar navbar-expand-lg navbar-glass sticky-top border-bottom">
    <div class="container py-2 position-relative">
      <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/admin">
        <span class="brand-icon"><i class="bi bi-mortarboard-fill"></i></span>
        <span class="brand-name">CampusForum</span>
      </a>

      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="badge badge-soft d-none d-md-inline">Admin • Categorías</span>
        <a class="btn btn-outline-primary" routerLink="/admin">Volver</a>
      </div>
    </div>
  </nav>

  <section class="container py-5">
    <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
      <div>
        <h1 class="section-title mb-2">Administración de Categorías</h1>
        <p class="section-subtitle mb-0">Crea, edita y elimina categorías del foro</p>
      </div>

      <div class="d-flex gap-2 align-items-center">
        <input class="form-control form-control-sm search-input"
               placeholder="Buscar categoría..."
               [(ngModel)]="search" />
      </div>
    </div>

    <!-- Crear categoría -->
    <div class="glass-card p-4 mb-4">
      <h2 class="feature-title mb-3">Nueva categoría</h2>

      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label small text-muted">Nombre</label>
          <input class="form-control" [(ngModel)]="newCategory.name" placeholder="Ej: Química" />
        </div>

        <div class="col-md-5">
          <label class="form-label small text-muted">Descripción</label>
          <input class="form-control" [(ngModel)]="newCategory.description" placeholder="Ej: Orgánica, inorgánica..." />
        </div>

        <div class="col-md-2">
          <label class="form-label small text-muted">Color</label>
          <select class="form-select" [(ngModel)]="newCategory.colorClass">
            <option value="dot-blue">Azul</option>
            <option value="dot-green">Verde</option>
            <option value="dot-purple">Morado</option>
            <option value="dot-yellow">Amarillo</option>
            <option value="dot-red">Rojo</option>
          </select>
        </div>

        <div class="col-md-2 d-grid">
          <button class="btn btn-primary" (click)="createCategory()">
            <i class="bi bi-plus-lg me-2"></i> Crear
          </button>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="glass-card p-3 p-md-4">
      <div class="table-responsive">
        <table class="table table-wire align-middle mb-0">
          <thead>
            <tr>
              <th>Categoría</th>
              <th>Descripción</th>
              <th class="text-center">Posts</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let c of filteredCategories">
              <td>
                <div class="d-flex align-items-center gap-3">
                  <span class="cat-dot" [class]="(editingId===c.id ? editForm.colorClass : c.colorClass)"></span>

                  <ng-container *ngIf="editingId!==c.id; else editName">
                    <span class="fw-bold">{{ c.name }}</span>
                  </ng-container>

                  <ng-template #editName>
                    <input class="form-control form-control-sm edit-input"
                           [(ngModel)]="editForm.name" />
                  </ng-template>
                </div>
              </td>

              <td>
                <ng-container *ngIf="editingId!==c.id; else editDesc">
                  <span class="text-muted">{{ c.description }}</span>
                </ng-container>

                <ng-template #editDesc>
                  <input class="form-control form-control-sm edit-input"
                         [(ngModel)]="editForm.description" />
                </ng-template>
              </td>

              <td class="text-center">
                <span class="badge badge-soft">{{ c.postCount }}</span>
              </td>

              <td class="text-end">
                <ng-container *ngIf="editingId!==c.id; else editActions">
                  <button class="btn btn-link text-decoration-none me-2" (click)="startEdit(c)" title="Editar">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button class="btn btn-link text-decoration-none text-danger" (click)="deleteCategory(c)" title="Eliminar">
                    <i class="bi bi-trash3"></i>
                  </button>
                </ng-container>

                <ng-template #editActions>
                  <select class="form-select form-select-sm d-inline-block me-2 color-select"
                          [(ngModel)]="editForm.colorClass">
                    <option value="dot-blue">Azul</option>
                    <option value="dot-green">Verde</option>
                    <option value="dot-purple">Morado</option>
                    <option value="dot-yellow">Amarillo</option>
                    <option value="dot-red">Rojo</option>
                  </select>

                  <button class="btn btn-outline-success btn-sm me-2" (click)="saveEdit(c)">
                    <i class="bi bi-check2"></i> Guardar
                  </button>

                  <button class="btn btn-outline-secondary btn-sm" (click)="cancelEdit()">
                    Cancelar
                  </button>
                </ng-template>
              </td>
            </tr>

            <tr *ngIf="filteredCategories.length===0">
              <td colspan="4" class="text-center text-muted py-4">
                No hay categorías con ese filtro.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </section>
</div>
